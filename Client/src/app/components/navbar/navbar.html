<header
  class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0 sticky top-0 z-40"
>
  <!-- Left: page title -->
  <h1 class="text-lg font-semibold text-slate-800">{{ pageTitle() }}</h1>

  <!-- Right: actions -->
  <div class="flex items-center gap-2">
    <!-- Search -->
    <button
      class="w-9 h-9 flex items-center justify-center rounded-xl text-slate-400 hover:bg-slate-100 hover:text-[#0C447C] transition-all duration-200"
    >
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="11" cy="11" r="7" />
        <line x1="16.5" y1="16.5" x2="22" y2="22" />
      </svg>
    </button>

    <!-- Notifications -->
    <button
      class="relative w-9 h-9 flex items-center justify-center rounded-xl text-slate-400 hover:bg-slate-100 hover:text-[#0C447C] transition-all duration-200"
    >
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 01-3.46 0" />
      </svg>
      <span
        class="absolute top-1.5 right-1.5 w-2 h-2 bg-[#5DCAA5] rounded-full border-2 border-white"
      ></span>
    </button>

    <!-- Language toggle -->
    <app-language-btn></app-language-btn>

    <!-- Avatar -->
    <!-- <div class="w-9 h-9 rounded-full bg-[#0C447C] text-white text-xs font-bold
                flex items-center justify-center cursor-pointer hover:opacity-80 transition-opacity">
      AE
    </div> -->
    <app-user-menu></app-user-menu>
  </div>
</header>
