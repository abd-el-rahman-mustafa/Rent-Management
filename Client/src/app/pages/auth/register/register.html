<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-md border border-gray-100">
    <div>
      <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">Register</h2>
      <p class="mt-2 text-center text-sm text-gray-600">Create your new account</p>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <app-input label="First Name" type="text" formControlName="firstName">
            </app-input>
          </div>

          <div>
            <app-input label="Last Name" type="text" formControlName="lastName">
            </app-input>
          </div>
        </div>

        <div>
          <app-input label="Email Address" type="email" formControlName="email">
          </app-input>
        </div>

        @if(otpSent){
        <div class="p-4 bg-gray-50 border rounded-lg space-y-4">
          <div>
            <div class="flex justify-between items-center mb-1">
              <label for="otp" class="block text-sm font-medium text-gray-700">OTP Code</label>
              <span class="text-xs font-bold px-2 py-1 rounded-full" [ngClass]="
                    otpCountdown <= 30 ? 'bg-red-100 text-red-700' : 'bg-indigo-100 text-indigo-700'
                  ">
                {{ otpCountdown | countdown }}
              </span>
            </div>
            <app-input type="text" formControlName="otp" placeholder="Enter the OTP sent to your email">
            </app-input>
          </div>

          <div>
            <app-input label="Password" type="password" formControlName="password">
            </app-input>
          </div>

          <div>
            <app-input label="Confirm Password" type="password" formControlName="confirmPassword">
            </app-input>
          </div>
        </div>
        }
      </div>

      <div>
        @if(otpSent){
        <button type="submit" [disabled]="otpCountdown <= 0 || registerForm.invalid"
          class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors">
          {{ otpCountdown <= 0 ? 'OTP Expired' : 'Complete Registration' }} </button>
            }@else {
            <button type="button" (click)="sendOtp()"
              class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
              Send OTP
            </button>
            }
      </div>

      <div class="text-center mt-4">
        <a href="/login" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
          Already have an account? Log in
        </a>
      </div>
    </form>
  </div>
</div>
