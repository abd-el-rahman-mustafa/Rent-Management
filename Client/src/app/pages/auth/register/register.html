<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-md border border-gray-100">
    <div>
      <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">Register</h2>
      <p class="mt-2 text-center text-sm text-gray-600">Create your new account</p>
    </div>
    
    <form class="mt-8 space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="firstName" class="block text-sm font-medium text-gray-700">First Name</label>
            <input id="firstName" type="text" formControlName="firstName" 
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                   [ngClass]="{'border-red-300': registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched}">
            <p *ngIf="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched" class="mt-1 text-xs text-red-600">First name is required</p>
          </div>

          <div>
            <label for="lastName" class="block text-sm font-medium text-gray-700">Last Name</label>
            <input id="lastName" type="text" formControlName="lastName" 
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                   [ngClass]="{'border-red-300': registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched}">
            <p *ngIf="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched" class="mt-1 text-xs text-red-600">Last name is required</p>
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
          <input id="email" type="email" formControlName="email" 
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                 [ngClass]="{'border-red-300': registerForm.get('email')?.invalid && registerForm.get('email')?.touched}">
          <p *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="mt-1 text-xs text-red-600">Valid email is required</p>
        </div>

        <ng-container *ngIf="otpSent">
          <div class="p-4 bg-gray-50 border rounded-lg space-y-4">
            <div>
              <div class="flex justify-between items-center mb-1">
                <label for="otp" class="block text-sm font-medium text-gray-700">OTP Code</label>
                <span class="text-xs font-bold px-2 py-1 rounded-full" 
                      [ngClass]="countdown <= 30 ? 'bg-red-100 text-red-700' : 'bg-indigo-100 text-indigo-700'">
                  {{ formatTime }}
                </span>
              </div>
              <input id="otp" type="text" formControlName="otp" placeholder="Enter the OTP sent to your email"
                     class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                     [ngClass]="{'border-red-300': registerForm.get('otp')?.invalid && registerForm.get('otp')?.touched}">
              <p *ngIf="registerForm.get('otp')?.invalid && registerForm.get('otp')?.touched" class="mt-1 text-xs text-red-600">OTP is required</p>
            </div>

            <div>
              <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
              <input id="password" type="password" formControlName="password" 
                     class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                     [ngClass]="{'border-red-300': registerForm.get('password')?.invalid && registerForm.get('password')?.touched}">
              <p *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="mt-1 text-xs text-red-600">Password is required</p>
            </div>

            <div>
              <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
              <input id="confirmPassword" type="password" formControlName="confirmPassword" 
                     class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                     [ngClass]="{'border-red-300': registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched}">
              <p *ngIf="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched" class="mt-1 text-xs text-red-600">Confirm Password is required</p>
            </div>
          </div>
        </ng-container>

      </div>

      <div>
        <button *ngIf="!otpSent" type="button" (click)="sendOtp()"
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
          Send OTP
        </button>

        <button *ngIf="otpSent" type="submit" [disabled]="countdown <= 0 || registerForm.invalid"
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors">
          {{ countdown <= 0 ? 'OTP Expired' : 'Complete Registration' }}
        </button>
      </div>
      
      <div class="text-center mt-4">
        <a href="/login" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
          Already have an account? Log in
        </a>
      </div>
    </form>
  </div>
</div>
