<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-md border border-gray-100">
    <div>
      <h2 class="mt-2 text-center text-3xl font-extrabold text-indigo-700">Log in to your account</h2>
      <p class="mt-2 text-center text-sm text-gray-600">Enter your credentials to access your account</p>
    </div>
    @if(!otpSent){
    <form class="mt-8 space-y-6" [formGroup]="requestForm" (ngSubmit)="sendLoginRequest()">
      <div class="space-y-4">
        <div>
          <app-input label="Email Address" type="email" formControlName="email">
          </app-input>
        </div>
        <div>
          <app-input label="Password" type="password" formControlName="password">
          </app-input>
        </div>

        <button type="submit" [disabled]=" requestForm.invalid"
          class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors">
          {{ 'Log In' }}
        </button>

        <div class="text-center mt-4">
          <a href="/register" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
            Don't have an account? Register
          </a>
        </div>
      </div>
    </form>
    }@else {
    <form class="mt-8 space-y-6" [formGroup]="otpLoginForm" (ngSubmit)="verifyOtp()">
      <div class="space-y-4">

        <div>
          <div class="flex justify-between items-center mb-1">
            <label for="emailOtpCode" class="block text-sm font-medium text-gray-700">OTP Code <span
                class="text-red-500">*</span></label>
            @if(otpCountdown > 0){

            <span class="text-xs font-bold px-2 py-1 rounded-full" [ngClass]="
                    otpCountdown <= 30 ? 'bg-red-100 text-red-700' : 'bg-indigo-100 text-indigo-700'
                    ">
              {{ otpCountdown | countdown }}
            </span>
            }@else {
            <button type="button" (click)="reSendOtp()"
              class="text-xs font-bold px-2 py-1 rounded-full bg-indigo-100 text-indigo-500 cursor-pointer hover:text-indigo-700">
              Send OTP Again
            </button>
            }
          </div>
          <app-input type="number" formControlName="otp" placeholder="Enter the OTP sent to your email">
          </app-input>
        </div>

        <button type="submit" [disabled]=" otpLoginForm.invalid"
          class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors">
          {{ 'Verify OTP' }}
        </button>

      </div>
    </form>
    }


  </div>
</div>
