<!-- users list name , email, phone, gender , active status , email verification -->


<div class="container">
    <h2>Users List</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Gender</th>
                <th>Active</th>
                <th>Email Verified</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let user of users">
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.phone }}</td>
                <td>{{ user.gender }}</td>
                <td>{{ user.active ? 'Yes' : 'No' }}</td>
                <td>{{ user.emailVerified ? 'Yes' : 'No' }}</td>
            </tr>
        </tbody>
    </table>
