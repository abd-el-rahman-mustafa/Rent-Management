<div class="relative">
  <!-- Avatar Button -->
  <button (click)="toggleMenu()"
    class="w-9 h-9 rounded-full bg-[#0C447C] text-white text-xs font-bold
              flex items-center justify-center cursor-pointer hover:opacity-80 transition-opacity focus:outline-none focus:ring-2 focus:ring-[#5DCAA5] focus:ring-offset-2">
    {{ user?.fullName?.substring(0, 2) || 'NA' }}
  </button>

  <!-- Dropdown Menu -->
  @if (isOpen()) {
  <!-- Backdrop for closing -->
  <div class="fixed inset-0 z-40" (click)="toggleMenu()"></div>

  <!-- Menu items -->
  <div
    class="absolute top-full mt-2 end-0 w-56 bg-white rounded-xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] border border-slate-100 py-1 z-50 origin-top-right transition-all transform opacity-100 scale-100">

    <div class="px-4 py-3 border-b border-slate-100">
      <p class="text-sm font-semibold text-slate-800">{{ user?.fullName }}</p>
      <p class="text-xs text-slate-500 truncate mt-0.5">{{ user?.email }}</p>
    </div>

    <div class="py-1.5">
      <button
        class="cursor-pointer w-full text-start px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 hover:text-[#0C447C] transition-colors flex items-center gap-3">
        <svg class="w-4.5 h-4.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        {{ lang() === 'en' ? 'My Profile' : 'الملف الشخصي' }}
      </button>
      <button
        class="cursor-pointer w-full text-start px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 hover:text-[#0C447C] transition-colors flex items-center gap-3">
        <svg class="w-4.5 h-4.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        {{ lang() === 'en' ? 'Account Settings' : 'إعدادات الحساب' }}
      </button>
    </div>

    <div class="py-1.5 border-t border-slate-100">
      <button (click)="logout()"
        class="cursor-pointer w-full text-start px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 transition-colors flex items-center gap-3 rounded-b-xl">
        <svg class="w-4.5 h-4.5 text-red-500 rtl:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        {{ lang() === 'en' ? 'Logout' : 'تسجيل الخروج' }}
      </button>
    </div>
  </div>
  }
</div>
