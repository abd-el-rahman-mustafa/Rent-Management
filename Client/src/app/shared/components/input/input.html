@if(label()){
<label class="block text-sm font-medium text-gray-700 mb-1">
  {{ label() }}
  @if(isRequired){
  <span class="text-red-500">*</span>
  }
</label>
}

<input
  class="mt-1 block w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 placeholder-gray-400 shadow-sm transition duration-150 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 hover:border-gray-400 disabled:cursor-not-allowed disabled:bg-gray-50 disabled:text-gray-400"
  [type]="type()" [placeholder]="placeholder()" [value]="value" [disabled]="disabled" (input)="handleInput($event)"
  (blur)="onTouched()" />

@if (control.errors && control.touched) {
<div class="text-red-500 mt-1.5 text-xs">
  @for (error of control.errors | keyvalue; track error.key) {
  <p>{{ getErrorMessage(error.key, error.value) }}</p>
  }
</div>
}
